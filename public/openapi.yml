  /api/platform/stores/{id}:
    get:
      tags: [Platform]
      summary: Ver detalle de una tienda y sus usuarios
      x-permission: platform.stores.view
      responses:
        "200": { description: Detalle de tienda }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Platform]
      summary: Actualizar o pausar una tienda
      x-permission: platform.stores.manage
      responses:
        "200": { description: Tienda actualizada }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/platform/users:
    get:
      tags: [Platform]
      summary: Listar usuarios de todas las tiendas
      x-permission: platform.users.view
      parameters:
        - $ref: "#/components/parameters/Skip"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
        - name: storeId
          in: query
          schema: { type: string, format: uuid }
        - name: role
          in: query
          schema: { type: string, enum: [admin, vendedor, almacen, contador] }
      responses:
        "200": { description: Lista paginada de usuarios de tienda }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Platform]
      summary: Crear administrador de una tienda existente
      description: Solo crea rol admin. Otros roles los gestiona el admin de cada tienda.
      x-permission: platform.users.manage
      responses:
        "201": { description: Administrador creado }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/platform/users/{id}:
    get:
      tags: [Platform]
      summary: Ver detalle de un usuario de tienda
      x-permission: platform.users.view
      responses:
        "200": { description: Detalle de usuario }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/platform/reports/{report}:
    get:
      tags: [Platform]
      summary: Generar un reporte de plataforma con alcance multi-tienda
      description: |
        Mismos reportes que `/api/reports/*`.
        `storeScope=all` (default), `one` o `selected`.
        Con `one`/`selected` requiere `storeIds` (CSV o repetido `storeId`).
      x-permission: platform.reports.view
      parameters:
        - name: report
          in: path
          required: true
          schema:
            type: string
            enum:
              [
                daily-sales,
                gross-profit,
                product-profitability,
                low-stock,
                customer-purchases,
                supplier-purchases,
                stock-card,
                top-products,
                top-customers,
                purchases,
              ]
        - $ref: "#/components/parameters/Skip"
        - $ref: "#/components/parameters/Limit"
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
          description: UUIDs separados por coma
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: productId
          in: query
          schema: { type: string }
        - name: supplierId
          in: query
          schema: { type: string }
      responses:
        "200": { description: Lista paginada del reporte }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/platform/home/summary:
    get:
      tags: [Platform]
      summary: Resumen agregado multi-tienda
      x-permission: platform.dashboard.view
      parameters:
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
      responses:
        "200": { description: Resumen del dia agregado }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/platform/home/metrics:
    get:
      tags: [Platform]
      summary: Metricas de periodo multi-tienda
      x-permission: platform.dashboard.view
      parameters:
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200": { description: Metricas del periodo }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/platform/home/sales-trend:
    get:
      tags: [Platform]
      summary: Tendencia de ventas multi-tienda (rollup por fecha)
      x-permission: platform.dashboard.view
      parameters:
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200": { description: Serie diaria agregada }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/platform/home/recent-sales:
    get:
      tags: [Platform]
      summary: Ventas recientes multi-tienda
      x-permission: platform.dashboard.view
      parameters:
        - $ref: "#/components/parameters/Skip"
        - $ref: "#/components/parameters/Limit"
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
      responses:
        "200": { description: Lista paginada de ventas }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/platform/home/low-stock:
    get:
      tags: [Platform]
      summary: Bajo stock multi-tienda
      x-permission: platform.dashboard.view
      parameters:
        - $ref: "#/components/parameters/Skip"
        - $ref: "#/components/parameters/Limit"
        - name: storeScope
          in: query
          schema: { type: string, enum: [all, one, selected], default: all }
        - name: storeIds
          in: query
          schema: { type: string }
      responses:
        "200": { description: Lista paginada de productos }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/platform/home/exchange-rate:
    get:
      tags: [Platform]
      summary: Tasa REF/VES de referencia para el header de plataforma
      x-permission: platform.dashboard.view
      responses:
        "200": { description: Tasa vigente }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/users:
    get:
      tags: [Users]
      summary: Listar perfiles mock
      x-permission: users.manage
      responses:
        "200":
          description: Usuarios mock
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserProfile"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/users/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    patch:
      tags: [Users]
      summary: Actualizar perfil mock
      x-permission: users.manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          $ref: "#/components/responses/UserProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Obtener usuario actual mock
      responses:
        "200":
          $ref: "#/components/responses/ReportObjectResponse"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          $ref: "#/components/responses/ReportObjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout mock
      responses:
        "200":
          $ref: "#/components/responses/ReportObjectResponse"
  /api/openapi:
    get:
      tags: [Docs]
      summary: Servir contrato OpenAPI YAML
      responses:
        "200":
          description: Contrato OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /api/docs:
    get:
      tags: [Docs]
      summary: Redirigir a Swagger UI
      responses:
        "307":
          description: Redireccion temporal a `/api-docs`.
components:
  securitySchemes:
    DemoRole:
      type: apiKey
      in: header
      name: x-demo-role
      description: "Rol temporal para endpoints mock: admin, vendedor, almacen o contador."
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
    Skip:
      name: skip
      in: query
      required: false
      description: Registros a omitir desde el inicio del resultado filtrado.
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      required: false
      description: Cantidad por pagina. Minimo 10, default 10.
      schema:
        type: integer
        minimum: 10
        default: 10
  responses:
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Sin permiso
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflicto de negocio, por ejemplo SKU duplicado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DashboardSummaryResponse:
      description: Resumen del dashboard
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                $ref: "#/components/schemas/DashboardSummary"
    ReportArrayResponse:
      description: Lista paginada generica
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                $ref: "#/components/schemas/PaginatedList"
    ReportObjectResponse:
      description: Objeto generico
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: object
    SaleArrayResponse:
      description: Lista paginada de ventas
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Sale"
    SupplierProductArrayResponse:
      description: Lista paginada de relaciones proveedor-producto
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SupplierProduct"
    SupplierProductPriceHistoryArrayResponse:
      description: Lista paginada de historial de precios proveedor-producto
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SupplierProductPriceHistory"
    UserProfileResponse:
      description: Perfil de usuario
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                $ref: "#/components/schemas/UserProfile"
  schemas:
    PaginatedList:
      type: object
      required: [items, skip, limit, total]
      properties:
        items:
          type: array
          items:
            type: object
        skip:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 10
        total:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [BAD_REQUEST, CONFLICT, FORBIDDEN, INTERNAL_ERROR, NOT_FOUND, UNAUTHORIZED]
            message:
              type: string
            issues:
              type: array
              items:
                type: object
    ContactType:
      type: string
      enum: [cliente, proveedor, ambos]
    SaleStatus:
      type: string
      enum: [borrador, pendiente_pago, pagada, cancelada, devuelta]
    PurchaseStatus:
      type: string
      enum: [pedido, recibido, cancelado, devuelto]
    PaymentDirection:
      type: string
      enum: [entrada, salida]
    PaymentMethod:
      type: string
      enum: [efectivo_ves, efectivo_usd, pago_movil, punto_venta, transferencia]
    StockMovementType:
      type: string
      enum:
        - venta
        - compra
        - ajuste_entrada
        - ajuste_salida
        - devolucion_cliente
        - devolucion_proveedor
        - inventario_inicial
    UserRole:
      type: string
      enum: [admin, vendedor, almacen, contador]
    Permission:
      type: string
      enum:
        - dashboard.view
        - sales.view
        - sales.create
        - purchases.view
        - purchases.create
        - inventory.view
        - inventory.manage
        - products.view
        - products.manage
        - contacts.view
        - contacts.manage
        - payments.view
        - payments.manage
        - reports.view
        - settings.view
        - users.manage
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
    CategoryResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Category"
    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    CategoryUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    SupplierProduct:
      type: object
      required: [id, supplierId, productId, isActive]
      properties:
        id:
          type: string
        supplierId:
          type: string
        productId:
          type: string
        lastCostRef:
          type: number
          minimum: 0
        lastCostVes:
          type: number
          minimum: 0
        lastPurchasedAt:
          type: string
          format: date-time
        supplierSku:
          type: string
        notes:
          type: string
        isActive:
          type: boolean
        lastPriceOrigin:
          $ref: "#/components/schemas/SupplierProductPriceOrigin"
        variationPercent:
          type: number
          description: Variacion porcentual vs penultimo registro de historial (null si primer registro)
        supplier:
          $ref: "#/components/schemas/Contact"
        product:
          $ref: "#/components/schemas/Product"
        packUnits:
          type: array
          items:
            $ref: "#/components/schemas/SupplierProductPackUnit"
        defaultPackUnit:
          $ref: "#/components/schemas/SupplierProductPackUnit"
    SupplierProductPackUnit:
      type: object
      required: [id, supplierProductId, label, unitsPerPack, isDefault, isActive]
      properties:
        id:
          type: string
        supplierProductId:
          type: string
        label:
          type: string
        unitsPerPack:
          type: integer
          minimum: 1
        isDefault:
          type: boolean
        isActive:
          type: boolean
    SupplierProductPackUnitInput:
      type: object
      required: [label, unitsPerPack]
      properties:
        label:
          type: string
          minLength: 1
        unitsPerPack:
          type: integer
          minimum: 1
        isDefault:
          type: boolean
    SupplierProductPackUnitUpdateInput:
      type: object
      properties:
        label:
          type: string
          minLength: 1
        unitsPerPack:
          type: integer
          minimum: 1
        isDefault:
          type: boolean
        isActive:
          type: boolean
    SupplierProductPriceOrigin:
      type: string
      enum: [cotizacion, compra, ajuste, vinculacion]
    SupplierProductPriceHistory:
      type: object
      required: [id, supplierProductId, newCostRef, origin, createdAt]
      properties:
        id:
          type: string
        supplierProductId:
          type: string
        oldCostRef:
          type: number
          minimum: 0
        newCostRef:
          type: number
          minimum: 0
        oldCostVes:
          type: number
          minimum: 0
        newCostVes:
          type: number
          minimum: 0
        origin:
          $ref: "#/components/schemas/SupplierProductPriceOrigin"
        variationPercent:
          type: number
          description: Calculado en mapper cuando oldCostRef > 0
        changedBy:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
    RegisterSupplierPriceResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [supplierProduct, historyId]
          properties:
            supplierProduct:
              $ref: "#/components/schemas/SupplierProduct"
            variationPercent:
              type: number
            historyId:
              type: string
    SupplierProductResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SupplierProduct"
    SupplierProductInput:
      type: object
      required: [supplierId, productId]
      properties:
        supplierId:
          type: string
        productId:
          type: string
        lastCostRef:
          type: number
          minimum: 0
        lastCostVes:
          type: number
          minimum: 0
        supplierSku:
          type: string
        notes:
          type: string
    SupplierProductUpdateInput:
      type: object
      properties:
        supplierSku:
          type: string
        notes:
          type: string
        isActive:
          type: boolean
    SupplierProductPriceInput:
      type: object
      required: [newCostRef, origin]
      properties:
        newCostRef:
          type: number
          minimum: 0
        newCostVes:
          type: number
          minimum: 0
        origin:
          $ref: "#/components/schemas/SupplierProductPriceOrigin"
        notes:
          type: string
    Product:
      type: object
      required: [id, sku, name, salePriceRef, currentCostRef, currentStock, minStock, isActive]
      properties:
        id:
          type: string
        categoryId:
          type: string
        sku:
          type: string
        name:
          type: string
        salePriceRef:
          type: number
        currentCostRef:
          type: number
        currentStock:
          type: integer
        minStock:
          type: integer
        isActive:
          type: boolean
    ProductResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Product"
    ProductCreateInput:
      type: object
      required: [name, sku, salePriceRef]
      properties:
        categoryId:
          type: string
        currentCostRef:
          type: number
          minimum: 0
        currentStock:
          type: integer
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        name:
          type: string
          minLength: 1
        salePriceRef:
          type: number
          minimum: 0
        sku:
          type: string
          minLength: 1
    ProductUpdateInput:
      type: object
      properties:
        categoryId:
          type: string
        currentCostRef:
          type: number
          minimum: 0
        currentStock:
          type: integer
          minimum: 0
        minStock:
          type: integer
          minimum: 0
        name:
          type: string
          minLength: 1
        salePriceRef:
          type: number
          minimum: 0
        sku:
          type: string
          minLength: 1
    ProductPriceInput:
      type: object
      required: [salePriceRef]
      properties:
        salePriceRef:
          type: number
          minimum: 0
    ProductPriceHistory:
      type: object
      required: [id, productId, salePriceRef, createdAt, userId]
      properties:
        id:
          type: string
        productId:
          type: string
        salePriceRef:
          type: number
        createdAt:
          type: string
          format: date-time
        userId:
          type: string
    Contact:
      type: object
      required: [id, name, type, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/ContactType"
        taxId:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        isActive:
          type: boolean
    ContactResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Contact"
    ContactCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/ContactType"
        taxId:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
    ContactUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/ContactType"
        taxId:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
    Sale:
      type: object
      required: [id, invoiceNumber, customerId, status, totalRef, totalVes, paidVes]
      properties:
        id:
          type: string
        invoiceNumber:
          type: string
        customerId:
          type: string
        status:
          $ref: "#/components/schemas/SaleStatus"
        subtotalRef:
          type: number
        discountRef:
          type: number
        taxRef:
          type: number
        totalRef:
          type: number
        totalVes:
          type: number
        paidVes:
          type: number
        refRateVes:
          type: number
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
    SaleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Sale"
    SaleCreateInput:
      type: object
      required: [customerId, items]
      properties:
        customerId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/LineItemInput"
        discountRef:
          type: number
          minimum: 0
        taxRef:
          type: number
          minimum: 0
        refRateVes:
          type: number
          minimum: 0
          exclusiveMinimum: true
    Purchase:
      type: object
      required: [id, purchaseNumber, supplierId, status, totalRef, totalVes, paidVes]
      properties:
        id:
          type: string
        purchaseNumber:
          type: string
        supplierId:
          type: string
        status:
          $ref: "#/components/schemas/PurchaseStatus"
        subtotalRef:
          type: number
        discountRef:
          type: number
        taxRef:
          type: number
        totalRef:
          type: number
        totalVes:
          type: number
        paidVes:
          type: number
        refRateVes:
          type: number
    PurchaseResponse:
